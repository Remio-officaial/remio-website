    });

})();

/* ===== 탭 전환 ===== */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(function(panel) {
    panel.classList.toggle('active', panel.id === 'panel-' + tab);
  });
}

/* ===== 더보기 ===== */
function expandGrid(type) {
  var grid = document.getElementById('grid-' + type);
  grid.classList.add('expanded');
  document.getElementById('more-' + type + '-wrap').style.display = 'none';
}

/* ===== 매장 상세 모달 ===== */
function openModal(index, type) {
  if (type !== 'food') return;
  var d = foodData[index];
  var base = IMG + d.folder + '/';

  document.getElementById('modalHero').src = base + d.photos[0];
  document.getElementById('modalLogo').src = base + d.logo;
  document.getElementById('modalName').textContent = d.name;
  document.getElementById('modalAddr').textContent = '📍 ' + d.addr;
  document.getElementById('modalDesc').textContent = d.desc;

  /* 매장 사진 갤러리 */
  var storeHtml = '';
  d.photos.forEach(function(p) {
    storeHtml += '<img src="' + base + p + '" alt="매장 사진" loading="lazy" onclick="openLightbox(this.src)">';
  });
  document.getElementById('modalStoreGallery').innerHTML = storeHtml;

  /* 메뉴 사진 갤러리 */
  var menuHtml = '';
  d.menus.forEach(function(m) {
    menuHtml += '<img src="' + base + m + '" alt="메뉴 사진" loading="lazy" onclick="openLightbox(this.src)">';
  });
  document.getElementById('modalMenuGallery').innerHTML = menuHtml;

  /* 리뷰이벤트 */
  document.getElementById('modalEvent').innerHTML =
    '<span class="modal-event-badge">🎁 리뷰이벤트</span>' +
    '<span class="modal-event-text">럭키카드 리뷰 작성 시 ' + d.evIcon + ' ' + d.evMenu + '</span>';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    closeModalDirect();
  }
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ===== 이미지 확대 뷰어 ===== */
function openLightbox(src) {
  event.stopPropagation();
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ESC 키로 닫기 */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) {
      closeLightbox();
    } else if (document.getElementById('modalOverlay').classList.contains('open')) {
      closeModalDirect();
    }
  }
});

/* ===== 스크롤 리빌 (IntersectionObserver) ===== */
(function initReveal() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(function(el) {
    observer.observe(el);
  });
})();
</script>
